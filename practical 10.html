<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practical 10 - Iframe Implementation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f6ff;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4a63e7;
            color: white;
            text-align: center;
            padding: 15px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 10px;
        }

        .frame-box {
            background: white;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            border: none;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            background-color: #4a63e7;
            color: white;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<header>
    <h1>Practical No. 10</h1>
    <p>Implementation of HTML Iframe and Embedding</p>
</header>
<div class="container">
    <!-- External Website -->
    <div class="frame-box">
        <h2>Embedded External Website</h2>
        <p>This iframe shows an external educational website.</p>

        <iframe src="https://www.wikipedia.org" 
                height="400"
                title="Wikipedia Website"
                loading="lazy">
        </iframe>
    </div>
    <!-- Google Map -->
    <div class="frame-box">
        <h2>Embedded Google Map</h2>
        <p>This iframe displays the location of our college.</p>
        <iframe 
            src="https://maps.google.com/maps?q=Nagpur&t=&z=13&ie=UTF8&iwloc=&output=embed"
            height="400"
            title="Nagpur Location Map"
            allowfullscreen
            loading="lazy">
        </iframe>
    </div>
</div>
<footer>
    <p>Created by First Year Engineering Student</p>
</footer>

</body>
</html>
